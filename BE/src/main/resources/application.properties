spring.application.name=fishnote
server.port=${PORT:8080}

# === CORS ===
# 쉼표 구분. 운영에서는 APP_CORS_ALLOWED_ORIGINS 환경변수로 덮어쓴다.
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175

# === PostgreSQL ===
# 로컬 기본값. 운영에서는 SPRING_DATASOURCE_* 환경변수로 덮어쓴다.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fishnote}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# 지연 로딩 컬렉션(제철 월·맛 태그 등)을 IN 쿼리로 묶어 조회 — N+1 완화
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# === 스키마 초기화 ===
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# === 이미지 업로드 (Cloudinary — CLOUDINARY_URL 환경변수 필요) ===
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
