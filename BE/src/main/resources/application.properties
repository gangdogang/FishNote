spring.application.name=fishnote
server.port=${PORT:8080}

# === CORS ===
# 쉼표 구분. 운영에서는 APP_CORS_ALLOWED_ORIGINS 환경변수로 덮어쓴다.
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175

# === PostgreSQL ===
# 로컬 기본값. 운영에서는 SPRING_DATASOURCE_* 환경변수로 덮어쓴다.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fishnote}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# === 커넥션 풀 (Neon serverless 대응) ===
# Neon은 유휴 연결을 서버 쪽에서 끊으므로 max-lifetime을 그보다 짧게 유지한다.
# minimum-idle=0 으로 유휴 시 풀을 비워 Neon 오토서스펜드도 방해하지 않는다.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=240000

# === JPA / Hibernate ===
# 운영 스키마는 Flyway가 변경하고 Hibernate는 엔티티 매핑만 검증한다.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# 지연 로딩 컬렉션(제철 월·맛 태그 등)을 IN 쿼리로 묶어 조회 — N+1 완화
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# === 스키마 마이그레이션 ===
# 기존 DB는 버전 0으로 baseline한 뒤 V1부터 안전하게 적용한다.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.sql.init.mode=never

# === 이미지 업로드 (Cloudinary — CLOUDINARY_URL 환경변수 필요) ===
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# === 레이트 리미팅 ===
# 익명 쓰기 엔드포인트(후기/삭제/도움돼요/이미지/로그인) IP 기반 제한. 테스트에서만 끈다.
app.rate-limit.enabled=true

# 도움돼요 중복 방지용 익명 식별 키 해시 pepper. 운영에서는 별도 값으로 덮어쓴다.
app.helpful-vote.pepper=${HELPFUL_VOTE_PEPPER:fishnote-helpful-vote}

# === Telegram price webhook ===
# 운영에서는 TELEGRAM_WEBHOOK_SECRET 환경변수로 설정한다.
app.telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:}
app.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}

# === Kakao OAuth ===
# 카카오 디벨로퍼스의 REST API 키와 Client Secret을 서버 환경변수로 설정한다.
app.kakao.oauth.client-id=${KAKAO_REST_API_KEY:}
app.kakao.oauth.client-secret=${KAKAO_CLIENT_SECRET:}
